services:
  mongodb:
    image: mongo:7
    container_name: garden_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: garden_redis
    ports:
      - "6379:6379"
    restart: unless-stopped


  auth-service:
    build:
      context: .
      args:
        SERVICE: auth-service
    env_file: .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/garden-auth
    depends_on:
      - mongodb
    restart: unless-stopped

  user-service:
    build:
      context: .
      args:
        SERVICE: user-service
    env_file: .env
    environment:
      MONGODB_URI_USERS: mongodb://mongodb:27017/garden-users
      NOTIFICATION_SERVICE_URL: http://notification-service:3007
    depends_on:
      - mongodb
      - notification-service
    restart: unless-stopped

  plant-service:
    build:
      context: .
      args:
        SERVICE: plant-service
    env_file: .env
    environment:
      MONGODB_URI_PLANTS: mongodb://mongodb:27017/garden-plants
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  compatibility-service:
    build:
      context: .
      args:
        SERVICE: compatibility-service
    restart: unless-stopped

  garden-service:
    build:
      context: .
      args:
        SERVICE: garden-service
    env_file: .env
    environment:
      MONGODB_URI_GARDENS: mongodb://mongodb:27017/garden-gardens
    depends_on:
      - mongodb
    restart: unless-stopped

  recommendation-service:
    build:
      context: .
      args:
        SERVICE: recommendation-service
    env_file: .env
    environment:
      MONGODB_URI_RECOMMENDATIONS: mongodb://mongodb:27017/garden-recommendations
      GARDEN_SERVICE_URL: http://garden-service:3005
    depends_on:
      - mongodb
      - garden-service
    restart: unless-stopped

  notification-service:
    build:
      context: .
      args:
        SERVICE: notification-service
    env_file: .env
    environment:
      MONGODB_URI_USERS: mongodb://mongodb:27017/garden-users
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:3006
      GARDEN_SERVICE_URL: http://garden-service:3005
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
      - recommendation-service
      - garden-service
    restart: unless-stopped

  ai-service:
    build:
      context: .
      args:
        SERVICE: ai-service
    env_file: .env
    environment:
      GARDEN_SERVICE_URL: http://garden-service:3005
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:3006
    depends_on:
      - garden-service
      - recommendation-service
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      args:
        SERVICE: api-gateway
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002/users
      PLANT_SERVICE_URL: http://plant-service:3003
      COMPATIBILITY_SERVICE_URL: http://compatibility-service:3004
      GARDEN_SERVICE_URL: http://garden-service:3005
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:3006
      AI_SERVICE_URL: http://ai-service:3008/ai
    depends_on:
      - auth-service
      - user-service
      - plant-service
      - compatibility-service
      - garden-service
      - recommendation-service
      - ai-service
    restart: unless-stopped

volumes:
  mongo_data:
